on:
  push:
    branches: [main]
    paths:
      - 'specs/feat-*/spec1.md'
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  validate_spec:
    runs-on: ubuntu-latest

    outputs:
      branch: ${{ steps.spec.outputs.branch }}
      file: ${{ steps.spec.outputs.file }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract spec
        id: spec
        run: |
          SPEC_FILE=$(ls specs/feat-*/*.md | head -n 1)
          BRANCH=$(basename $(dirname "$SPEC_FILE"))
          echo "Spec file: $SPEC_FILE"
          echo "Branch name: $BRANCH"
          echo "file=$SPEC_FILE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Validate spec
        run: python validate_spec.py "${{ steps.spec.outputs.file }}"

  approval:
    runs-on: ubuntu-latest
    needs: validate_spec
    steps:
      - name: Request approval
        uses: trstringer/manual-approval@v1.12.0
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: vm349177
          minimum-approvals: 1
          issue-title: "Approve spec ${{ needs.validate_spec.outputs.branch }}"
          issue-body: |
            Approve to start implementation of spec ${{ needs.validate_spec.outputs.branch }}
            File: ${{ needs.validate_spec.outputs.file }}

  implement-spec:
    runs-on: ubuntu-latest
    needs: 
      - approval
      - validate_spec
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create implementation branch
        run: |
          BRANCH="${{ needs.validate_spec.outputs.branch }}"
          FULL_BRANCH="implement/$BRANCH"

          git fetch origin

          if git ls-remote --exit-code --heads origin "$FULL_BRANCH"; then
            echo "Branch exists. Checking out and pulling..."
            git checkout "$FULL_BRANCH"
            git pull origin "$FULL_BRANCH"
          else
            echo "Creating new branch..."
            git checkout -b "$FULL_BRANCH"
          fi
      - name: Create dummy file
        run: |
          echo "Test implementation" > test.txt

      # - name: Run AI agent
      #   run: |
      #     python run_agent.py --spec "${{ steps.spec.outputs.file }}" --branch "implement/${{ steps.spec.outputs.branch }}"

      - name: Push changes
        run: |
          git add .
          git commit -m "Implement spec ${{ needs.validate_spec.outputs.branch }}"
          git push origin "implement/${{ needs.validate_spec.outputs.branch }}"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "${{ needs.validate_spec.outputs.branch }}: Auto Implementation" \
            --body "Generated from spec ${{ needs.validate_spec.outputs.file }}" \
            --base main \
            --head "implement/${{ needs.validate_spec.outputs.branch }}" || echo "PR already exists"